name: Build ALL Pedidos AAB

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Configurar JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Android SDK
      uses: android-actions/setup-android@v3

    - name: Decodificar keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > signing.keystore

    - name: Dar permisos a gradlew
      run: chmod +x gradlew

    - name: Compilar AAB release
      run: |
        ./gradlew bundleRelease \
          -Pandroid.injected.signing.store.file=${{ github.workspace }}/signing.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.STORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=my-key-alias \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

    - name: Subir AAB como artefacto
      uses: actions/upload-artifact@v4
      with:
        name: ALL-Pedidos-AAB
        path: app/build/outputs/bundle/release/app-release.aab
